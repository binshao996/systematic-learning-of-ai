services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforgepass
      POSTGRES_DB: agent_forge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
